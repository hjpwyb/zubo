name: Test Links in live.txt

on:
  workflow_dispatch: # 手动触发
  schedule:          # 定时运行
    - cron: '0 3 * * *' # 每天 UTC 时间 3 点运行

jobs:
  test-links:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3 # 拉取仓库代码

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Link Tester
      run: python test_links.py

    - name: Commit and Push Results
      if: success()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add valid_links.txt invalid_links.txt
        git commit -m "Update tested links result"
        git push
